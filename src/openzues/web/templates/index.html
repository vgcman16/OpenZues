<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ settings.app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Codex Control Plane</p>
          <h1>OpenZues</h1>
          <p class="lede">
            Local-first operator UX for Codex App Server, approvals, live thread telemetry,
            project context, and GitHub workflows.
          </p>
        </div>
        <div class="hero-stats" id="hero-stats"></div>
      </header>

      <main class="grid">
        <section class="panel span-2">
          <div class="panel-head">
            <h2>Connections</h2>
            <button class="ghost" id="refresh-dashboard" type="button">Refresh</button>
          </div>
          <form id="instance-form" class="stack form-grid">
            <input name="name" type="text" placeholder="Name" required />
            <select name="transport">
              <option value="stdio">Stdio</option>
              <option value="websocket">WebSocket</option>
            </select>
            <input name="command" type="text" placeholder="Command (codex)" />
            <input name="args" type="text" placeholder="Args (app-server)" />
            <input name="websocket_url" type="text" placeholder="ws://127.0.0.1:8787" />
            <input name="cwd" type="text" placeholder="Working directory" />
            <label class="checkbox">
              <input name="auto_connect" type="checkbox" />
              Auto-connect
            </label>
            <button type="submit">Create Connection</button>
          </form>
          <div id="instances" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Environment</h2>
            <button class="ghost" id="refresh-diagnostics" type="button">Check</button>
          </div>
          <div id="diagnostics" class="stack"></div>
        </section>

        <section class="panel span-2">
          <div class="panel-head">
            <h2>Playbooks</h2>
          </div>
          <form id="playbook-form" class="stack form-grid">
            <input name="name" type="text" placeholder="Playbook name" required />
            <select name="kind">
              <option value="command">Command</option>
              <option value="turn">Turn</option>
              <option value="thread_turn">Thread + Turn</option>
              <option value="review">Review</option>
            </select>
            <input name="instance_id" type="number" min="1" placeholder="Instance ID (optional)" />
            <input name="cwd" type="text" placeholder="CWD template (optional)" />
            <input name="model" type="text" placeholder="Model (thread-turn only)" />
            <input name="thread_id" type="text" placeholder="Thread ID template (turn/review)" />
            <textarea
              name="description"
              placeholder="What this playbook is for"
            ></textarea>
            <textarea
              name="template"
              placeholder="Template. Supports {date}, {datetime}, {cwd}, {thread_id}, and custom variables."
              required
            ></textarea>
            <button type="submit">Save Playbook</button>
          </form>
          <div id="playbooks" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Projects</h2>
          </div>
          <form id="project-form" class="stack">
            <input name="path" type="text" placeholder="C:\path\to\repo" required />
            <input name="label" type="text" placeholder="Optional label" />
            <button type="submit">Add Project</button>
          </form>
          <div id="projects" class="stack"></div>
        </section>

        <section class="panel span-3">
          <div class="panel-head">
            <h2>Event Timeline</h2>
            <input
              id="event-filter"
              type="text"
              placeholder="Filter by method, thread, instance, or payload"
            />
          </div>
          <div id="events" class="events"></div>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" hidden></div>
    <script type="module" src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
