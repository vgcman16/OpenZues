<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }} · ForumForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ request.url_for('static', path='app.css') }}" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand-lockup" href="{{ request.url_for('home') }}">
          <span class="brand-mark">FF</span>
          <span class="brand-copy">
            <strong>ForumForge</strong>
            <span>Editorial community software for teams that ship.</span>
          </span>
        </a>
        <form class="site-search" action="{{ request.url_for('search_page') }}" method="get">
          <input type="search" name="q" value="{{ request.query_params.get('q', '') }}" placeholder="Search threads, tags, knowledge..." />
          <button type="submit">Search</button>
        </form>
        <nav class="site-nav">
          <a href="{{ request.url_for('home') }}">Home</a>
          <a href="{{ request.url_for('forum_page', forum_slug='product-strategy') }}">Strategy</a>
          <a href="{{ request.url_for('forum_page', forum_slug='build-systems') }}">Build</a>
          <a href="{{ request.url_for('forum_page', forum_slug='design-lab') }}">Design</a>
          <a href="{{ request.url_for('moderation_queue_page') }}">Moderation</a>
        </nav>
      </header>

      {% if notice %}
        <aside class="notice notice-{{ notice.kind }}">{{ notice.message }}</aside>
      {% endif %}

      <main class="page-shell">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <div>
          <strong>ForumForge</strong>
          <span>Threads with memory, signal, and resolution built in.</span>
        </div>
        <div class="footer-links">
          <a href="{{ request.url_for('search_page') }}?q=knowledge">Knowledge</a>
          <a href="{{ request.url_for('forum_page', forum_slug='build-systems') }}?sort=signal">Signal</a>
          <a href="{{ request.url_for('forum_page', forum_slug='design-lab') }}">Craft</a>
          <a href="{{ request.url_for('moderation_queue_page') }}">Moderation</a>
        </div>
      </footer>
    </div>

    <script src="{{ request.url_for('static', path='app.js') }}" defer></script>
  </body>
</html>
